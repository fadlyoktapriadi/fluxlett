name: fluxlett
description: "A new Flutter project."

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # Dependency Injection
#  get_it: ^9.2.1

  # UI
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.2.3
  flutter_screenutil: ^5.9.3
  google_fonts: ^8.0.2

  # Storage
#  hive: ^2.2.3
#  hive_flutter: ^1.1.0

  # Model
#  freezed_annotation: ^3.1.0
#  json_annotation: ^4.11.0

  # State Management
#  flutter_bloc: ^9.1.1
#  dartz: ^0.10.1

  # Routing
  go_router: ^17.1.0

  # Additional
#  intl: ^0.20.2
#  logger: ^2.6.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/

  fonts:
    - family: SF-Pro
      fonts:
        - asset: assets/fonts/SF-Pro-Text-Light.otf
          weight: 400
        - asset: assets/fonts/SF-Pro-Text-Regular.otf
          weight: 400
        - asset: assets/fonts/SF-Pro-Text-Medium.otf
          weight: 500
        - asset: assets/fonts/SF-Pro-Text-SemiBold.otf
          weight: 600
        - asset: assets/fonts/SF-Pro-Text-Bold.otf
          weight: 700
      
      
